{% extends "base.html" %}
{% block title %}AI Assistant | Student Hub{% endblock %}
{% block content %}
<h2>AI Academic Assistant</h2>
<p>Ask about courses, materials, assignments, or calendar events.</p>
<form method="post">
    {% csrf_token %}
    <div class="row">
        <label for="query">Your question</label>
        <textarea id="query" name="query" rows="4" required>{{ query }}</textarea>
    </div>
    <button type="submit">Ask</button>
</form>

{% if answer %}
    <hr>
    <h3>Assistant Answer</h3>
    <pre style="white-space: pre-wrap;">{{ answer }}</pre>
{% endif %}
{% endblock %}
