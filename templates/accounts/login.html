{% extends "base.html" %}
{% block title %}Login | Student Hub{% endblock %}
{% block content %}
<h2>Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="row">
        <label for="{{ form.username.id_for_label }}">Email</label>
        {{ form.username }}
    </div>
    <div class="row">
        <label for="{{ form.password.id_for_label }}">Password</label>
        {{ form.password }}
    </div>
    <button type="submit">Sign in</button>
</form>
<p style="margin-top:1rem;">New student? <a href="{% url 'accounts:register_student' %}">Create account</a></p>
{% endblock %}
