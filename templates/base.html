<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Hub{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f5f7fb; }
        .card { background: white; padding: 1.2rem; border-radius: 8px; max-width: 720px; margin: 0 auto; }
        .row { margin-bottom: 0.8rem; }
        label { display: block; margin-bottom: 0.2rem; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 0.55rem; }
        button { padding: 0.6rem 1rem; cursor: pointer; }
        .topbar { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .msg { background: #e8f3ff; padding: 0.5rem; margin-bottom: 0.8rem; border-left: 3px solid #2b7de9; }
        .errorlist { color: #b00020; }
    </style>
</head>
<body>
    <div class="card">
        <div class="topbar">
            <strong>Student Hub</strong>
            {% if request.user.is_authenticated %}
                <a href="{% url 'accounts:logout' %}">Logout</a>
            {% endif %}
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
